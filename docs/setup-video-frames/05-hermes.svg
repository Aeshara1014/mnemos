  <text x="704" y="188" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" letter-spacing="2"><tspan fill="#ffffff" fill-opacity="0.9">PROVIDER</tspan><tspan fill="#ffffff" fill-opacity="0.4" font-size="15" letter-spacing="0"> · mnemos takes the slot</tspan></text>
