      <circle cx="1180" cy="96" r="2.4"/><circle cx="1108" cy="140" r="2.4"/><circle cx="1238" cy="150" r="2.4"/>
      <circle cx="1150" cy="210" r="2.4"/><circle cx="1086" cy="250" r="2.4"/><circle cx="1216" cy="250" r="2.4"/>
      <circle cx="1066" cy="170" r="2.4"/><circle cx="1245" cy="212" r="2.4"/><circle cx="1130" cy="300" r="2.4"/>
      <circle cx="1200" cy="300" r="2.4"/><circle cx="1040" cy="248" r="2.4"/>
