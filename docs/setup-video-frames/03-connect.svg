  <text x="96" y="74" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="3.5" fill="#ffffff" fill-opacity="0.5">CONNECT</text>
  <text x="1184" y="74" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#ffffff" fill-opacity="0.28">02 — SETUP</text>
  <g font-family="JetBrains Mono, ui-monospace, monospace">
    <text x="96" y="206" font-size="24"><tspan fill="#ffffff" fill-opacity="0.42">$ </tspan><tspan fill="#ffffff" fill-opacity="0.95">mnemos mcp install claude --write</tspan></text>
    <text x="96" y="248" font-size="19"><tspan fill="#ffffff" fill-opacity="0.4">→ </tspan><tspan fill="#ffffff" fill-opacity="0.55">wrote mnemos server to Claude Desktop config</tspan></text>
  </g>
  <rect x="96" y="288" width="720" height="150" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="21">
    <text x="124" y="332" fill="#ffffff" fill-opacity="0.5">"mcpServers": {</text>
    <text x="156" y="372"><tspan fill="#f5f6f7">"mnemos"</tspan><tspan fill="#ffffff" fill-opacity="0.5">: { </tspan><tspan fill="#ffffff" fill-opacity="0.62">"command"</tspan><tspan fill="#ffffff" fill-opacity="0.5">: </tspan><tspan fill="#ffffff" fill-opacity="0.8">"mnemos"</tspan><tspan fill="#ffffff" fill-opacity="0.5">, </tspan><tspan fill="#ffffff" fill-opacity="0.62">"args"</tspan><tspan fill="#ffffff" fill-opacity="0.5">: </tspan><tspan fill="#ffffff" fill-opacity="0.8">["serve"]</tspan><tspan fill="#ffffff" fill-opacity="0.5"> }</tspan></text>
    <text x="124" y="412" fill="#ffffff" fill-opacity="0.5">}</text>
  </g>
  <circle cx="140" cy="365" r="4" fill="#ffffff"/>
  <text x="96" y="506" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22"><tspan fill="#ffffff" fill-opacity="0.45">↻ </tspan><tspan fill="#ffffff" fill-opacity="0.82">restart Claude Desktop to connect.</tspan></text>
  <text x="96" y="552" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" fill="#ffffff" fill-opacity="0.4">also: mnemos mcp install <tspan fill="#ffffff" fill-opacity="0.6">codex · cursor · generic</tspan> — same installer, prints what to paste.</text>
