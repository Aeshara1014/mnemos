      <stop offset="0%" stop-color="#101218"/>
      <stop offset="55%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#08090c"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="#08090c"/>
  <rect width="1280" height="720" fill="url(#lift3)"/>
  <rect width="1280" height="1" fill="#ffffff" opacity="0.05"/>
  <g opacity="0.7">
    <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
      <line x1="1180" y1="96" x2="1108" y2="140"/><line x1="1180" y1="96" x2="1238" y2="150"/>
