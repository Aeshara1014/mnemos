<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mnemos — title (living substrate)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#000;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  #tc-wrap{position:relative;width:100%;max-width:1280px;aspect-ratio:16/9;border-radius:14px;overflow:hidden;}
  #tc-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:pointer;}
</style>
</head>
<body>
<div id="tc-wrap"><canvas id="tc-canvas"></canvas></div>
<script>
(function(){
  const wrap=document.getElementById('tc-wrap'), canvas=document.getElementById('tc-canvas'), ctx=canvas.getContext('2d');
  const LW=1280, LH=720;
  let off=document.createElement('canvas'), octx=off.getContext('2d'), S=1;
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const seg=(t,a,b)=>clamp((t-a)/(b-a),0,1);
  const lerp=(a,b,x)=>a+(b-a)*x;
  const DORM='178,186,202', LINE='150,160,180', HOT='224,231,247', NEW='150,176,228';
  const rcx=720, rcy=348, R=300, N=300;
  let nodes=[], edges=[], hubs=[], act, newEdges=[];
  function buildGraph(){
    const rng=mulberry32(20260621);
    const gauss=()=> (rng()+rng()+rng()+rng()-2)/2;
    const clusters=[]; for(let i=0;i<6;i++) clusters.push({x:rcx+(rng()-0.5)*R*1.1, y:rcy+(rng()-0.5)*R*1.0});
    nodes=[];
    for(let i=0;i<N;i++){
      let x,y;
      if(rng()<0.52){ const c=clusters[(rng()*clusters.length)|0]; const a=rng()*6.283, rad=Math.abs(gauss())*R*0.18; x=c.x+Math.cos(a)*rad; y=c.y+Math.sin(a)*rad; }
      else { const a=rng()*6.283, rad=R*Math.pow(rng(),0.6); x=rcx+Math.cos(a)*rad; y=rcy+Math.sin(a)*rad; }
      let dx=x-rcx, dy=y-rcy, d=Math.hypot(dx,dy); if(d>R){ x=rcx+dx/d*R; y=rcy+dy/d*R; d=R; }
      const t=clamp(d/R,0,1);
      nodes.push({x,y,t,baseA:0.07+0.40*Math.pow(1-t,1.7),size:0.7+1.0*Math.pow(1-t,1.5),deg:0});
    }
    edges=[];
    const inner=[]; for(let i=0;i<N;i++) if(nodes[i].t<0.78) inner.push(i);
    for(const i of inner){
      const ni=nodes[i]; const cand=[];
      for(const j of inner){ if(j===i) continue; const d=Math.hypot(nodes[j].x-ni.x,nodes[j].y-ni.y); if(d<74) cand.push([d,j]); }
      cand.sort((a,b)=>a[0]-b[0]);
      const k=2+((rng()*3)|0);
      for(let m=0;m<Math.min(k,cand.length);m++){ const j=cand[m][1]; const lo=Math.min(i,j),hi=Math.max(i,j); edges.push([lo,hi,1-cand[m][0]/74]); nodes[i].deg++; nodes[j].deg++; }
    }
    const seen=new Set(); edges=edges.filter(e=>{const k=e[0]+'-'+e[1]; if(seen.has(k))return false; seen.add(k); return true;});
    hubs=[...Array(N).keys()].sort((a,b)=>(nodes[b].deg+(1-nodes[b].t)*4)-(nodes[a].deg+(1-nodes[a].t)*4)).slice(0,16);
    for(const h of hubs){ nodes[h].baseA=Math.min(0.6,nodes[h].baseA+0.16); nodes[h].size+=0.8; }
    act=new Float32Array(N); newEdges=[];
  }
  function renderStatic(){
    octx.setTransform(S,0,0,S,0,0); octx.clearRect(0,0,LW,LH);
    octx.fillStyle='#08090c'; octx.fillRect(0,0,LW,LH);
    let vg=octx.createRadialGradient(rcx,rcy,R*0.25,rcx,rcy,R*1.35); vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.62)'); octx.fillStyle=vg; octx.fillRect(0,0,LW,LH);
    let sc=octx.createLinearGradient(0,560,0,720); sc.addColorStop(0,'rgba(8,9,12,0)'); sc.addColorStop(1,'rgba(8,9,12,0.82)'); octx.fillStyle=sc; octx.fillRect(0,520,LW,200);
    octx.fillStyle='#ffffff'; octx.globalAlpha=0.05; octx.fillRect(0,0,1280,1); octx.globalAlpha=1;
    octx.lineWidth=1;
    for(const e of edges){ const a=nodes[e[0]], b=nodes[e[1]]; octx.strokeStyle='rgba('+LINE+','+(0.04+0.05*e[2]).toFixed(3)+')'; octx.beginPath(); octx.moveTo(a.x,a.y); octx.lineTo(b.x,b.y); octx.stroke(); }
    for(const n of nodes){ octx.fillStyle='rgba('+DORM+','+n.baseA.toFixed(3)+')'; octx.beginPath(); octx.arc(n.x,n.y,n.size,0,7); octx.fill(); }
  }
  function resize(){
    const cssW=wrap.clientWidth||1180, cssH=cssW*(LH/LW), dpr=Math.min(2,window.devicePixelRatio||1);
    canvas.width=Math.round(cssW*dpr); canvas.height=Math.round(cssH*dpr);
    off.width=canvas.width; off.height=canvas.height; S=(cssW*dpr)/LW;
    ctx.setTransform(S,0,0,S,0,0); renderStatic();
  }
  function glow(x,y,r,col,a){ if(a<=0)return; ctx.save(); ctx.globalCompositeOperation='lighter'; const g=ctx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,'rgba('+col+','+a+')'); g.addColorStop(1,'rgba('+col+',0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.restore(); }
  function txt(s,x,y,size,col,sp,weight,fam){ ctx.save(); ctx.font=(weight||400)+" "+size+"px '"+(fam||'JetBrains Mono')+"',ui-monospace,monospace"; ctx.fillStyle=col; try{ctx.letterSpacing=(sp||0)+'px';}catch(e){} ctx.fillText(s,x,y); ctx.restore(); }
  let lastBig=-9999, nextBig=1600, nextAmb=0, lastRewire=-9999;
  function step(t){
    const a=act, tmp=new Float32Array(a.length);
    for(const e of edges){ const f=(a[e[0]]-a[e[1]])*0.16*e[2]; tmp[e[0]]-=f; tmp[e[1]]+=f; }
    for(let i=0;i<a.length;i++){ a[i]=(a[i]+tmp[i])*0.935; if(a[i]<0)a[i]=0; }
    if(t>nextAmb){ a[(Math.random()*a.length)|0]+=0.5; nextAmb=t+80+Math.random()*150; }
    if(t>nextBig){ const h=hubs[(Math.random()*hubs.length)|0]; a[h]+=5.2; lastBig=t; nextBig=t+2600+Math.random()*2200; }
    if(t-lastBig>850 && t-lastBig<950 && t-lastRewire>2200){
      const acts=[]; for(let i=0;i<a.length;i++) if(a[i]>0.5) acts.push(i);
      if(acts.length>3){ const p=acts[(Math.random()*acts.length)|0], q=acts[(Math.random()*acts.length)|0];
        if(p!==q){ const ex=edges.some(e=>(e[0]===p&&e[1]===q)||(e[0]===q&&e[1]===p)); if(!ex){ edges.push([Math.min(p,q),Math.max(p,q),0.9]); newEdges.push({a:p,b:q,t0:t}); if(newEdges.length>7) newEdges.shift(); lastRewire=t; } } }
    }
  }
  function draw(t){
    ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.drawImage(off,0,0); ctx.restore();
    ctx.setTransform(S,0,0,S,0,0);
    ctx.lineWidth=1.1;
    for(const e of edges){ const m=Math.min(act[e[0]],act[e[1]]); if(m>0.05){ const al=clamp(m,0,1); ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle='rgba('+HOT+','+(0.5*al).toFixed(3)+')'; ctx.beginPath(); ctx.moveTo(nodes[e[0]].x,nodes[e[0]].y); ctx.lineTo(nodes[e[1]].x,nodes[e[1]].y); ctx.stroke(); ctx.restore(); } }
    let peak=0;
    for(let i=0;i<nodes.length;i++){ const v=act[i]; if(v>peak)peak=v; if(v>0.04){ const n=nodes[i], e=clamp(v,0,1); glow(n.x,n.y,7+24*e,HOT,0.4*e); ctx.fillStyle='rgba('+HOT+','+(0.3+0.7*e).toFixed(3)+')'; ctx.beginPath(); ctx.arc(n.x,n.y,n.size+1.2*e,0,7); ctx.fill(); } }
    for(const ne of newEdges){ const A=nodes[ne.a], B=nodes[ne.b], age=t-ne.t0, pr=clamp(seg(t,ne.t0,ne.t0+650),0,1); ctx.save(); ctx.globalCompositeOperation='lighter'; const br=age<650?0.92:0.30; ctx.strokeStyle='rgba('+NEW+','+br.toFixed(3)+')'; ctx.lineWidth=age<650?1.6:1; ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(lerp(A.x,B.x,pr),lerp(A.y,B.y,pr)); ctx.stroke(); ctx.restore(); if(age<650){ glow(lerp(A.x,B.x,pr),lerp(A.y,B.y,pr),12,NEW,0.55); } }
    txt('LIVING MEMORY',96,72,13.5,'rgba(150,160,180,0.5)',2.4,500);
    txt('3,400 engrams · 17,000 connections',96,96,12,'rgba(120,128,144,0.5)',0,400);
    txt('Mnemos',92,624,86,'#f5f6f7',-1.5,500,'Inter');
    txt('Connect MCP. Get continuity.',96,668,25,'rgba(255,255,255,0.6)',0,400,'Inter');
    const stat = (t-lastRewire<900)?'a new bond forms' : peak>1.2?'a thought propagates' : 'idle · firing';
    ctx.save(); ctx.font="400 13px 'JetBrains Mono',ui-monospace,monospace"; const w=ctx.measureText(stat).width; ctx.restore();
    txt(stat,1184-w,668,13,'rgba(150,160,180,0.5)',0,400);
  }
  let prev=null;
  function frame(ts){ if(prev===null)prev=ts; prev=ts; step(ts); draw(ts); requestAnimationFrame(frame); }
  canvas.addEventListener('click',()=>{ for(let k=0;k<3;k++){ const h=hubs[(Math.random()*hubs.length)|0]; act[h]+=4.6; } });
  function boot(){ buildGraph(); resize(); window.addEventListener('resize',resize); requestAnimationFrame(frame); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(boot); setTimeout(()=>{ if(!nodes.length) boot(); },500); } else boot();
})();
</script>
</body>
</html>
